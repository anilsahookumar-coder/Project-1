<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World | Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="orbit one" aria-hidden="true"></div>
  <div class="orbit two" aria-hidden="true"></div>

  <header class="site-header">
    <a class="logo" href="index.html">Hello</a>
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="page-shell contact-layout">
    <section class="intro-panel">
      <div class="badge"><span class="spark"></span>Contact</div>
      <h1>Drop a bright little note.</h1>
      <p>Use the form mockup below or jump back through the nav. This page is styled and ready for a real form handler later.</p>
    </section>

    <form class="contact-card" action="mailto:hello@example.com" method="post" enctype="text/plain">
      <label>
        Name
        <input type="text" name="name" placeholder="Your name">
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com">
      </label>
      <label>
        Message
        <textarea name="message" rows="5" placeholder="Hello there..."></textarea>
      </label>
      <button type="submit">Send message</button>
    </form>
  </main>
</body>
</html>
