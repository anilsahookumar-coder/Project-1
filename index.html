<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fbff;
      --muted: #b6c4d6;
      --aqua: #58f5d7;
      --rose: #ff6f91;
      --gold: #ffd166;
      --night: #09111f;
      --panel: rgba(10, 24, 42, 0.72);
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(88, 245, 215, 0.28), transparent 26%),
        radial-gradient(circle at 84% 22%, rgba(255, 111, 145, 0.26), transparent 28%),
        radial-gradient(circle at 72% 78%, rgba(255, 209, 102, 0.19), transparent 26%),
        linear-gradient(135deg, #08111f 0%, #10152c 48%, #141021 100%);
    }

    body::before {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
    }

    main {
      width: min(92vw, 820px);
      min-height: 420px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 28px;
      padding: clamp(32px, 8vw, 72px);
      position: relative;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.13), transparent 34%),
        var(--panel);
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(24px);
      isolation: isolate;
    }

    main::after {
      position: absolute;
      inset: -2px;
      content: "";
      z-index: -1;
      border-radius: 30px;
      background: linear-gradient(120deg, var(--aqua), transparent 32%, var(--rose), transparent 68%, var(--gold));
      opacity: 0.75;
      filter: blur(18px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--aqua);
      box-shadow: 0 0 18px var(--aqua), 0 0 34px var(--aqua);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.25rem, 13vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-align: center;
      text-wrap: balance;
      background: linear-gradient(90deg, #ffffff 0%, #9fffee 35%, #ffd8e1 70%, #ffe59a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 18px 50px rgba(88, 245, 215, 0.16);
    }

    p {
      max-width: 560px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.7;
      text-align: center;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.1);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    a:first-child {
      color: #06111d;
      background: linear-gradient(90deg, var(--aqua), var(--gold));
      border-color: transparent;
    }

    a:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.42);
      background-color: rgba(255, 255, 255, 0.16);
    }

    .orbit {
      position: fixed;
      width: 36vmin;
      height: 36vmin;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 50%;
      animation: drift 14s linear infinite;
    }

    .orbit.one {
      top: 10vh;
      left: 8vw;
    }

    .orbit.two {
      right: 8vw;
      bottom: 8vh;
      width: 28vmin;
      height: 28vmin;
      animation-duration: 18s;
      animation-direction: reverse;
    }

    @keyframes drift {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 560px) {
      main {
        border-radius: 20px;
        min-height: 380px;
      }

      .actions {
        width: 100%;
      }

      a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="orbit one" aria-hidden="true"></div>
  <div class="orbit two" aria-hidden="true"></div>

  <main>
    <div class="badge"><span class="spark"></span>First light</div>
    <h1>Hello<br>World</h1>
    <p>A tiny page with a little glass, glow, and motion. Built as a clean standalone HTML file you can open anywhere.</p>
    <div class="actions" aria-label="Page actions">
      <a href="#" onclick="event.preventDefault()">Say hello</a>
      <a href="#" onclick="event.preventDefault()">Look fancy</a>
    </div>
  </main>
</body>
</html>
